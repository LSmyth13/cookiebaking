<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Project — Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf3e7;
    --dough: #f4e4c1;
    --butter: #e9c46a;
    --caramel: #c08552;
    --cocoa: #5d3a1a;
    --chocolate: #2e1a0d;
    --chip: #3b1f0f;
    --berry: #b5384b;
    --mint: #6a8e5a;
    --shadow: rgba(70, 35, 10, 0.12);
    --bg: #c9dcef;
    --bg-dot: #6a8db5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, var(--bg-dot) 1.5px, transparent 2px),
      radial-gradient(circle at 80% 60%, var(--bg-dot) 1.2px, transparent 1.8px),
      radial-gradient(circle at 45% 85%, var(--bg-dot) 1px, transparent 1.5px),
      radial-gradient(circle at 90% 15%, var(--bg-dot) 1.3px, transparent 1.8px),
      radial-gradient(circle at 25% 70%, var(--bg-dot) 1px, transparent 1.5px),
      radial-gradient(circle at 60% 30%, var(--bg-dot) 1.4px, transparent 2px);
    background-size: 220px 220px, 280px 280px, 200px 200px, 320px 320px, 240px 240px, 260px 260px;
    color: var(--chocolate);
    min-height: 100vh;
    padding: 2.5rem 2rem;
  }

  header {
    max-width: 1400px;
    margin: 0 auto 2.5rem;
    text-align: center;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-style: italic;
    color: var(--caramel);
    font-size: 1.05rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .brand::before, .brand::after {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--caramel);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    color: var(--chocolate);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    color: var(--caramel);
    font-weight: 400;
  }

  .subtitle {
    margin-top: 0.8rem;
    color: var(--cocoa);
    font-size: 1.05rem;
    opacity: 0.75;
  }

  .board {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
  }

  @media (max-width: 1100px) {
    .board { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .board { grid-template-columns: 1fr; }
    body { padding: 1.5rem 1rem; }
  }

  .column {
    background: rgba(255, 252, 245, 0.7);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(192, 133, 82, 0.2);
    border-radius: 18px;
    padding: 1.25rem;
    box-shadow: 0 8px 24px var(--shadow);
    min-height: 400px;
    transition: background 0.2s, border-color 0.2s;
  }

  .column.drag-over {
    background: rgba(233, 196, 106, 0.18);
    border-color: var(--butter);
    border-style: dashed;
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 2px dashed rgba(192, 133, 82, 0.3);
  }

  .column-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.25rem;
    color: var(--chocolate);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .column-icon {
    font-size: 1.4rem;
  }

  .count {
    background: var(--butter);
    color: var(--chocolate);
    font-weight: 700;
    font-size: 0.8rem;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    min-width: 26px;
    text-align: center;
  }

  .cards { display: flex; flex-direction: column; gap: 0.75rem; min-height: 50px; }

  .card {
    background: var(--cream);
    border: 1.5px solid rgba(192, 133, 82, 0.25);
    border-radius: 12px;
    padding: 0.9rem 1rem;
    cursor: grab;
    box-shadow: 0 2px 6px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    position: relative;
    user-select: none;
  }

  .card:hover {
    transform: translateY(-2px) rotate(-0.5deg);
    box-shadow: 0 6px 14px var(--shadow);
  }

  .card.dragging { opacity: 0.4; cursor: grabbing; }

  .card-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.4rem;
  }

  .tag-prep { background: #fde4cf; color: #a04400; }
  .tag-bake { background: #e9c46a; color: var(--chocolate); }
  .tag-decorate { background: #f4cccc; color: var(--berry); }
  .tag-shop { background: #d4e4c1; color: var(--mint); }

  .card-text {
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--chocolate);
    word-wrap: break-word;
  }

  .card-delete {
    position: absolute;
    top: 0.4rem;
    right: 0.5rem;
    background: transparent;
    border: none;
    color: var(--caramel);
    font-size: 1.1rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 0.1rem 0.3rem;
    line-height: 1;
  }

  .card:hover .card-delete { opacity: 0.6; }
  .card-delete:hover { opacity: 1 !important; color: var(--berry); }

  .add-form {
    margin-top: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .add-input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1.5px dashed rgba(192, 133, 82, 0.4);
    border-radius: 10px;
    background: transparent;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--chocolate);
    resize: none;
  }

  .add-input:focus {
    outline: none;
    border-style: solid;
    border-color: var(--caramel);
    background: rgba(255, 252, 245, 0.5);
  }

  .add-input::placeholder { color: var(--caramel); opacity: 0.6; }

  .add-btn {
    align-self: flex-start;
    background: var(--cocoa);
    color: var(--cream);
    border: none;
    padding: 0.45rem 0.9rem;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }

  .add-btn:hover { background: var(--chocolate); transform: translateY(-1px); }

  .tag-select {
    padding: 0.4rem 0.6rem;
    border: 1.5px solid rgba(192, 133, 82, 0.3);
    border-radius: 8px;
    background: var(--cream);
    font-family: inherit;
    font-size: 0.85rem;
    color: var(--chocolate);
    cursor: pointer;
  }

  footer {
    max-width: 1400px;
    margin: 2.5rem auto 0;
    text-align: center;
    color: var(--caramel);
    font-size: 0.85rem;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="brand">A baker's plan</div>
  <h1>Cookie <em>Project</em> Kanban</h1>
  <p class="subtitle">Drag cards between stages — from idea to oven to plate.</p>
</header>

<main class="board" id="board">
  <section class="column" data-column="ideas">
    <div class="column-header">
      <div class="column-title"><span class="column-icon">💡</span>Ideas</div>
      <span class="count">0</span>
    </div>
    <div class="cards"></div>
    <div class="add-form">
      <textarea class="add-input" placeholder="A new cookie idea..." rows="2"></textarea>
      <select class="tag-select">
        <option value="prep">Prep</option>
        <option value="bake">Baking</option>
        <option value="decorate">Decorate</option>
        <option value="shop">Shopping</option>
      </select>
      <button class="add-btn">+ Add card</button>
    </div>
  </section>

  <section class="column" data-column="todo">
    <div class="column-header">
      <div class="column-title"><span class="column-icon">📝</span>To Do</div>
      <span class="count">0</span>
    </div>
    <div class="cards"></div>
    <div class="add-form">
      <textarea class="add-input" placeholder="Next task..." rows="2"></textarea>
      <select class="tag-select">
        <option value="prep">Prep</option>
        <option value="bake">Baking</option>
        <option value="decorate">Decorate</option>
        <option value="shop">Shopping</option>
      </select>
      <button class="add-btn">+ Add card</button>
    </div>
  </section>

  <section class="column" data-column="baking">
    <div class="column-header">
      <div class="column-title"><span class="column-icon">🔥</span>In the Oven</div>
      <span class="count">0</span>
    </div>
    <div class="cards"></div>
    <div class="add-form">
      <textarea class="add-input" placeholder="What's in progress..." rows="2"></textarea>
      <select class="tag-select">
        <option value="prep">Prep</option>
        <option value="bake">Baking</option>
        <option value="decorate">Decorate</option>
        <option value="shop">Shopping</option>
      </select>
      <button class="add-btn">+ Add card</button>
    </div>
  </section>

  <section class="column" data-column="done">
    <div class="column-header">
      <div class="column-title"><span class="column-icon">🍪</span>Done</div>
      <span class="count">0</span>
    </div>
    <div class="cards"></div>
    <div class="add-form">
      <textarea class="add-input" placeholder="Already finished..." rows="2"></textarea>
      <select class="tag-select">
        <option value="prep">Prep</option>
        <option value="bake">Baking</option>
        <option value="decorate">Decorate</option>
        <option value="shop">Shopping</option>
      </select>
      <button class="add-btn">+ Add card</button>
    </div>
  </section>
</main>

<footer>Made with butter, sugar, and a little bit of patience.</footer>

<script>
  // Starter cards to give a sense of how it works
  const starter = [
    { col: 'ideas', tag: 'bake', text: 'Brown butter chocolate chip' },
    { col: 'ideas', tag: 'bake', text: 'Snickerdoodles for grandma' },
    { col: 'todo', tag: 'shop', text: 'Buy flour, sugar, vanilla extract' },
    { col: 'todo', tag: 'shop', text: 'Pick up unsalted butter' },
    { col: 'todo', tag: 'prep', text: 'Soften butter to room temperature' },
    { col: 'baking', tag: 'prep', text: 'Cream butter and sugars (5 min)' },
    { col: 'done', tag: 'prep', text: 'Preheat oven to 180°C' },
  ];

  let cardId = 0;

  function createCard(text, tag) {
    const card = document.createElement('div');
    card.className = 'card';
    card.draggable = true;
    card.dataset.id = `card-${++cardId}`;

    const tagLabels = { prep: 'Prep', bake: 'Baking', decorate: 'Decorate', shop: 'Shopping' };
    card.innerHTML = `
      <span class="card-tag tag-${tag}">${tagLabels[tag] || tag}</span>
      <button class="card-delete" aria-label="Delete">×</button>
      <div class="card-text"></div>
    `;
    card.querySelector('.card-text').textContent = text;
    card.querySelector('.card-delete').addEventListener('click', e => {
      e.stopPropagation();
      card.remove();
      updateCounts();
    });

    card.addEventListener('dragstart', e => {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    return card;
  }

  function updateCounts() {
    document.querySelectorAll('.column').forEach(col => {
      col.querySelector('.count').textContent = col.querySelectorAll('.card').length;
    });
  }

  // Drag & drop on columns
  document.querySelectorAll('.column').forEach(col => {
    const cards = col.querySelector('.cards');
    col.addEventListener('dragover', e => {
      e.preventDefault();
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const dragged = document.querySelector(`[data-id="${id}"]`);
      if (dragged) {
        cards.appendChild(dragged);
        updateCounts();
      }
    });
  });

  // Add card form
  document.querySelectorAll('.column').forEach(col => {
    const input = col.querySelector('.add-input');
    const select = col.querySelector('.tag-select');
    const btn = col.querySelector('.add-btn');
    const cards = col.querySelector('.cards');

    const submit = () => {
      const text = input.value.trim();
      if (!text) return;
      cards.appendChild(createCard(text, select.value));
      input.value = '';
      updateCounts();
    };

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });
  });

  // Seed
  starter.forEach(item => {
    const col = document.querySelector(`[data-column="${item.col}"] .cards`);
    col.appendChild(createCard(item.text, item.tag));
  });
  updateCounts();
</script>

</body>
</html>
